# Nginx reverse proxy config for Nonprofit AI Radar
# Copy to: /etc/nginx/sites-available/radar.bridgesstrategy.com
# Then: ln -s /etc/nginx/sites-available/radar.bridgesstrategy.com /etc/nginx/sites-enabled/
# Then: sudo nginx -t && sudo systemctl reload nginx
# Then: sudo certbot --nginx -d radar.bridgesstrategy.com

server {
    listen 80;
    server_name radar.bridgesstrategy.com;

    # Redirect to HTTPS (certbot will add this automatically)
    # location / { return 301 https://$host$request_uri; }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # Cache static assets
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }
}
